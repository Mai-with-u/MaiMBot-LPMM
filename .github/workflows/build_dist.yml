# 对QuickAlgo构建源码分发包和wheel分发包的CI配置
name: QuickAlgo Distribution CI
on:
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install build tools (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install dependencies
        run: |
          pip install cython setuptools

      - name: Build source distribution
        run: |
          cd lib/quick_algo
          python ./build_lib.py --cleanup --cythonize --build_dist
          cd ../..

      - name: Upload source distribution
        uses: actions/upload-artifact@v3
        with:
          name: src_dist
          paths: lib/quick_algo/dist/*.tar.gz

  build-wheel:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install build tools (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Ensure MSVC Build Tools (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "MSVC tools will be automatically available on windows-latest"

      - name: Install dependencies
        run: |
          pip install cython setuptools numpy scipy networkx

      - name: Build wheel distribution
        run: |
          cd lib/quick_algo
          python ./build_lib.py --cleanup --cythonize --build_wheel_dist
          cd ../..

      - name: Upload wheel distribution
        uses: actions/upload-artifact@v3
        with:
          name: bin_dist_${{ matrix.python-version }}_${{ matrix.os }}
          paths: lib/quick_algo/dist/*.whl
