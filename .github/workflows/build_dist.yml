# 对QuickAlgo构建源码分发包和wheel分发包的CI配置
name: QuickAlgo Distribution CI
on:
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install build tools (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install dependencies
        run: |
          pip install cython build setuptools py-cpuinfo wheel

      - name: Build source distribution
        working-directory: lib/quick_algo
        run: python ./build_lib.py --cleanup --cythonize --build_sdist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: lib/quick_algo/dist/*.tar.gz

  build-wheel:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install cython build setuptools py-cpuinfo wheel

      - name: Build wheel distribution
        working-directory: lib/quick_algo
        run: python ./build_lib.py --cleanup --cythonize --build_wheel --compile_no_simd

      - name: Upload wheel distribution
        uses: actions/upload-artifact@v4
        with:
          name: wheel_${{ matrix.python-version }}_${{ matrix.os }}
          path: lib/quick_algo/dist/*.whl